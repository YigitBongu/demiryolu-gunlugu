name: Demiryolu Günlüğü

on:
  schedule:
    # GitHub cron UTC ile çalışır. GitHub ücretsiz zamanlanmış işleri yoğun
    # saatlerde (özellikle saat başları) geciktirir veya atlar; bu yüzden:
    #  (1) yuvarlak olmayan bir dakika seçtik (çakışma az),
    #  (2) güvenlik ağı olarak iki kez tetikliyoruz — biri atlanırsa diğeri yakalar.
    # Kod aynı gün ikinci çalışmada "yeni haber yok" deyip zararsız çıkar.
    - cron: "38 4 * * *"    # 04:38 UTC = 07:38 Türkiye saati (ana çalışma)
    - cron: "23 6 * * *"    # 06:23 UTC = 09:23 Türkiye saati (yedek çalışma)
  workflow_dispatch: {}   # Actions sekmesinden elle tetikleme (test için)

permissions:
  contents: write          # seen.json ve arsiv/ klasörünü repoya işlemek için

jobs:
  bulten:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları yükle
        run: pip install feedparser requests

      - name: Bülteni üret ve gönder
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python railway_digest.py

      - name: Durumu ve arşivi repoya işle
        run: |
          git config user.name "demiryolu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json docs/ 2>/dev/null || true
          git commit -m "günlük durum: $(date -u +%F)" || echo "işlenecek değişiklik yok"
          git push || true
