name: Demiryolu Günlüğü

on:
  schedule:
    # GitHub cron UTC ile çalışır: 03:47 UTC = 06:47 Türkiye saati.
    # Not: GitHub zamanlanmış işleri ±15-30 dk geciktirebilir; tam dakika garantisi yoktur.
    - cron: "47 3 * * *"
  workflow_dispatch: {}   # Actions sekmesinden elle tetikleme (test için)

permissions:
  contents: write          # seen.json ve arsiv/ klasörünü repoya işlemek için

jobs:
  bulten:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları yükle
        run: pip install feedparser requests

      - name: Bülteni üret ve gönder
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python railway_digest.py

      - name: Durumu ve arşivi repoya işle
        run: |
          git config user.name "demiryolu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json docs/ 2>/dev/null || true
          git commit -m "günlük durum: $(date -u +%F)" || echo "işlenecek değişiklik yok"
          git push || true
